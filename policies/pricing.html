<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Pricing</title>

  <style>
    body { margin: 2rem; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
    main { max-width: 78ch; }
  </style>
</head>
<body>
  <main>
    <h1>Pricing</h1>
    <p>This page is provided for reference.</p>

    <article id="policy-content">Loading…</article>
  </main>

  <script src="assets/js/marked.umd.js"></script>
  <script>
    const mdUrl = new URL("../assets/markdown/pricing.md", window.location.href);

    fetch(mdUrl)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status} for ${mdUrl}`);
        return r.text();
      })
      .then(md => {
        document.getElementById("policy-content").innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById("policy-content").textContent =
          "Unable to load pricing.";
        console.error(err);
        console.log("Tried:", mdUrl.toString());
      });
  </script>
</body>
</html>
