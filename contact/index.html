<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Shayaan Danish">
    <title>Contact | Shayaan Danish</title>
    <link rel="stylesheet" href="assets/css/contact.css">
</head>
<body class="contact-page">

    <!-- Navigation -->
    <nav class="navbar">
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="../projects/index.html">Projects</a></li>
            <li><a href="../support/index.html">Support a Project</a></li>
            <li><a href="index.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Main -->
    <main class="contact-main">

        <h1 class="contact-heading">Get in touch.</h1>

        <form class="contact-form" id="contactForm" novalidate>

            <input type="hidden" name="access_key" value="5267d136-aaad-413f-b772-40f22eaead36">
            <input type="hidden" name="subject" value="New message from shayaandanish.com">
            <input type="checkbox" name="botcheck" style="display:none">

            <div class="contact-field">
                <input
                    type="text"
                    name="name"
                    id="name"
                    placeholder="Name"
                    autocomplete="name"
                    required
                >
            </div>

            <div class="contact-field">
                <input
                    type="email"
                    name="email"
                    id="email"
                    placeholder="Email"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="contact-field">
                <textarea
                    name="message"
                    id="message"
                    placeholder="Message"
                    rows="6"
                    required
                ></textarea>
            </div>

            <button type="submit" class="contact-submit" id="submitBtn">
                <span class="submit-label">Send</span>
                <span class="submit-spinner" aria-hidden="true"></span>
            </button>

            <!-- Inline success / error -->
            <div class="contact-feedback" id="contactFeedback" role="alert" aria-live="polite"></div>

        </form>

    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-left">
                <p>&copy; Shayaan Danish 2026</p>
                <a href="mailto:shayaan0303@gmail.com" class="footer-email">shayaan0303@gmail.com</a>
            </div>
            <div class="footer-right">
                <a href="../policies/terms-and-conditions.html">Terms and Conditions</a>
                <a href="../policies/privacy.html">Privacy Policy</a>
                <a href="../policies/refund.html">Refund Policy</a>
                <a href="../policies/pricing.html">Pricing</a>
            </div>
        </div>
    </footer>

    <script src="assets/js/contact.js"></script>

</body>
</html>
